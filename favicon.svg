<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Xoá Phông Ảnh">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c3002f"/>
      <stop offset="1" stop-color="#ff4d4f"/>
    </linearGradient>
    <pattern id="checker" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#ffffff"/>
      <rect width="4" height="4" fill="#d7dadf"/>
      <rect x="4" y="4" width="4" height="4" fill="#d7dadf"/>
    </pattern>
  </defs>

  <!-- nền bo góc gradient đỏ -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#g)"/>

  <!-- khung ảnh trắng -->
  <rect x="14" y="16" width="36" height="32" rx="5" fill="#ffffff"/>

  <!-- nửa trái: ảnh (núi + mặt trời) -->
  <clipPath id="left">
    <rect x="18" y="20" width="14" height="24" rx="2"/>
  </clipPath>
  <g clip-path="url(#left)">
    <rect x="18" y="20" width="14" height="24" fill="#ffe1e3"/>
    <circle cx="22" cy="26" r="2.4" fill="#ff4d4f"/>
    <path d="M18 44l5-8 4 5 3-4 2 7z" fill="#c3002f"/>
  </g>

  <!-- nửa phải: vùng nền đã xoá (ô caro trong suốt) -->
  <rect x="32" y="20" width="14" height="24" rx="2" fill="url(#checker)"/>
</svg>
